name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore QuranCompanion.slnx

      - name: Build
        run: dotnet build QuranCompanion.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test QuranCompanion.slnx --configuration Release --no-build --verbosity normal
