server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: React Router client-side routing. Bilinmeyen path'ler index.html'e düşer,
    # tarayıcı React Router'ı boot eder, gerçek route'a resolve olur.
    # Bu satır olmadan /surahs/2 refresh → nginx 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash'lenmiş asset'ler (Vite bundle'ı [name]-[hash].js üretir) — sonsuz cache güvenli.
    location ~* \.(?:js|css|woff2?|ttf|otf|jpg|jpeg|png|svg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # index.html cache YASAK — deploy sonrası kullanıcının hemen yeni versiyonu görmesi için.
    # Aksi halde hash'li asset'ler yenilenmiş olsa da eski index.html'i cache'den servis eder,
    # eski asset URL'lerini ister, 404 spam olur.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Metin asset'ler için gzip (nginx alpine'da default off).
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 512;
}
