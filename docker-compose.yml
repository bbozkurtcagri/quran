services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: qurancompanion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: qurancompanion
      POSTGRES_PASSWORD: qurancompanion
      POSTGRES_DB: qurancompanion
      PGDATA: /var/lib/postgresql/data/pgdata
    # Host port 5433 to avoid clashing with other local Postgres instances
    # (e.g. Homebrew postgres, my-postgres container) that bind 5432.
    ports:
      - "5433:5432"
    volumes:
      - qurancompanion-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qurancompanion -d qurancompanion"]
      interval: 5s
      timeout: 5s
      retries: 10

  embedder:
    build:
      context: ./services/embedder
      dockerfile: Dockerfile
    container_name: qurancompanion-embedder
    restart: unless-stopped
    # Host port 8001 so it doesn't clash with the API and is easy to curl.
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qurancompanion-api
    restart: unless-stopped
    # Host port 8085 so a host-side `dotnet run` on 5185 can coexist.
    ports:
      - "8085:8080"
    environment:
      # Service-to-service: 'postgres' resolves via the compose network.
      # Inside the container we use the internal port 5432, not the host's 5433.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=qurancompanion;Username=qurancompanion;Password=qurancompanion;Include Error Detail=true"
      Embedder__BaseUrl: "http://embedder:8000"
      ASPNETCORE_ENVIRONMENT: "Production"
    depends_on:
      postgres:
        condition: service_healthy
      embedder:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  qurancompanion-pgdata:
    name: qurancompanion-pgdata
